<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Counter-Strike 2 pro match schedule — S-Tier and A-Tier events, live scores, and countdowns.">
  <meta name="theme-color" content="#f7f9fc">
  <title>CS2 Pro Matches — S & A Tier</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page-cs2">
  <div class="page-bg" aria-hidden="true"></div>

  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <div class="sport-picker">
          <button type="button" class="sport-picker-btn" id="sport-picker-btn" aria-haspopup="listbox" aria-expanded="false" aria-label="Choose sport">
            <span class="sport-picker-icon" aria-hidden="true">🎮</span>
            <span class="sport-picker-caret" aria-hidden="true">▾</span>
          </button>
          <div class="sport-picker-menu" id="sport-picker-menu" hidden role="listbox"></div>
        </div>
        <div>
          <h1>CS2 Pro Matches</h1>
          <p class="brand-sub">S-Tier &amp; A-Tier events</p>
        </div>
      </div>
      <div class="header-actions">
        <button type="button" id="refresh-btn" class="btn btn-ghost" title="Reload latest match data">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M21 12a9 9 0 1 1-2.64-6.36"/><polyline points="21 3 21 9 15 9"/>
          </svg>
          <span class="btn-label">Refresh</span>
        </button>
      </div>
    </div>
  </header>

  <main class="main">
    <section class="stats-bar" id="stats-bar" aria-label="Match summary">
      <div class="stat-card">
        <span class="stat-value" id="stat-upcoming">—</span>
        <span class="stat-label">Upcoming</span>
      </div>
      <div class="stat-card stat-live">
        <span class="stat-value" id="stat-live">—</span>
        <span class="stat-label">Live now</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="stat-finished">—</span>
        <span class="stat-label">Last 48h</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="stat-total">—</span>
        <span class="stat-label">Total matches</span>
      </div>
    </section>

    <section class="controls" aria-label="Filters">
      <div class="controls-row">
        <div class="control-group control-search">
          <label for="search-input">Search</label>
          <input type="search" id="search-input" placeholder="Team, event, tournament…" autocomplete="off">
        </div>
        <div class="control-group">
          <label for="team-filter">Team</label>
          <select id="team-filter">
            <option value="">All teams</option>
          </select>
        </div>
        <div class="control-group">
          <label for="status-filter">Status</label>
          <select id="status-filter">
            <option value="all">All matches</option>
            <option value="upcoming" selected>Upcoming only</option>
            <option value="live">Live only</option>
            <option value="finished">Results (48h)</option>
          </select>
        </div>
      </div>
      <div class="controls-row">
        <div class="control-group">
          <label for="tier-filter">Tier</label>
          <select id="tier-filter">
            <option value="sa" selected>S + A Tier</option>
            <option value="S">S-Tier only</option>
            <option value="A">A-Tier only</option>
          </select>
        </div>
        <div class="control-group">
          <label for="event-filter">Tournament</label>
          <select id="event-filter">
            <option value="">All tournaments</option>
          </select>
        </div>
        <div class="control-group">
          <label for="timezone-select">Timezone</label>
          <select id="timezone-select"></select>
        </div>
      </div>
      <div class="controls-row">
        <div class="control-group control-toggle">
          <label class="toggle-label">
            <input type="checkbox" id="group-by-date" checked>
            <span>Group by date</span>
          </label>
        </div>
      </div>
    </section>

    <p class="meta-line" id="meta-line" aria-live="polite"></p>

    <div id="loading" class="loading" hidden>
      <div class="spinner" aria-hidden="true"></div>
      <p>Loading matches…</p>
    </div>

    <div id="error" class="error-banner" hidden role="alert">
      <p id="error-message"></p>
      <button type="button" class="btn btn-small" id="retry-btn">Try again</button>
    </div>

    <div id="matches-container" class="matches-container"></div>

    <p id="empty-state" class="empty-state" hidden>No matches match your filters. Try adjusting your selection.</p>
  </main>

  <footer class="site-footer">
    <p>Match data via <a href="https://bo3.gg" target="_blank" rel="noopener">BO3.gg</a>. S-Tier &amp; A-Tier events for the next 12 months plus results from the last 48 hours.</p>
  </footer>

  <script src="shared.js"></script>
  <script src="data/cs2-matches.js"></script>
  <script src="cs2.js"></script>
</body>
</html>
